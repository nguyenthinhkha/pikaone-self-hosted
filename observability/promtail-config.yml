server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_logging']
        regex: pikaone
        action: keep
    pipeline_stages:
      # Unwrap Docker's {"log":"...","stream":"stdout","time":"..."} envelope first.
      - docker: {}
      - json:
          expressions:
            level: level
            msg: msg
            requestId: requestId
            url: req.url
            method: req.method
            statusCode: res.statusCode
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          container:
      - timestamp:
          source: time
          format: RFC3339Nano
